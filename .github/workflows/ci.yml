name: CI

# 在 push 到 main 与 PR 时跑 lint + 单元测试 + build。
# 不含需要真实 Zotero 的集成 test 任务,保证 CI 稳定通过。
# Runs lint + unit tests + build on pushes to main and PRs.
# No Zotero-dependent integration test, so CI stays green.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # zotero-types 间接依赖 zotero/epub.js(声明为 git+ssh),改走 https 才能装。
      # zotero-types pulls zotero/epub.js as a git+ssh dep; rewrite it to https.
      - name: Rewrite GitHub ssh -> https
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint (prettier + eslint)
        run: npm run lint:check

      - name: Unit tests
        run: npm run test:unit

      - name: Build (scaffold + tsc)
        run: npm run build
