name: Release

# 手动触发(Actions 页面运行),构建并把 xpi + update.json 发布到 GitHub Release。
# 由 zotero-plugin-scaffold 的 release 命令完成(读取 package.json 版本)。
# 默认设为手动触发以免与手动建 Release 冲突;确认 `npm run release` 行为符合预期后,
# 可改成 `on: push: tags: ['v*']` 实现「推 tag 即发布」。
# Manual trigger (run from the Actions tab): builds and publishes xpi +
# update.json via zotero-plugin-scaffold's release command. Manual by default to
# avoid clobbering a hand-made release; once you've confirmed `npm run release`
# behaves, switch to `on: push: tags: ['v*']` for tag-triggered publishing.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Rewrite GitHub ssh -> https
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Publish release (xpi + update.json)
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
