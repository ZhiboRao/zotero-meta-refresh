<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>

<vbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
  style="padding: 8px; max-width: 720px"
>
  <label><html:h2 data-l10n-id="pref-title"></html:h2></label>

  <!-- 运行行为 / Behaviour -->
  <groupbox>
    <label><html:h3 data-l10n-id="group-behaviour"></html:h3></label>
    <checkbox
      id="zotero-prefpane-__addonRef__-updateAuthors"
      preference="updateAuthors"
      data-l10n-id="pref-updateAuthors"
    />
    <checkbox
      id="zotero-prefpane-__addonRef__-upgradePreprints"
      preference="upgradePreprints"
      data-l10n-id="pref-upgradePreprints"
    />
    <checkbox
      id="zotero-prefpane-__addonRef__-skipChinese"
      preference="skipChinese"
      data-l10n-id="pref-skipChinese"
    />
    <checkbox
      id="zotero-prefpane-__addonRef__-backupToExtra"
      preference="backupToExtra"
      data-l10n-id="pref-backupToExtra"
    />
  </groupbox>

  <!-- 匹配与限流 / Matching & rate limit -->
  <groupbox>
    <label><html:h3 data-l10n-id="group-matching"></html:h3></label>
    <hbox align="center">
      <html:label
        for="zotero-prefpane-__addonRef__-threshold"
        data-l10n-id="pref-threshold"
        style="margin-inline-end: 8px"
      ></html:label>
      <html:input
        type="text"
        size="6"
        id="zotero-prefpane-__addonRef__-threshold"
        preference="titleSimilarityThreshold"
      />
    </hbox>
    <hbox align="center" style="margin-top: 4px">
      <html:label
        for="zotero-prefpane-__addonRef__-delay"
        data-l10n-id="pref-delay"
        style="margin-inline-end: 8px"
      ></html:label>
      <html:input
        type="number"
        min="0"
        step="100"
        size="8"
        id="zotero-prefpane-__addonRef__-delay"
        preference="delayMs"
      />
    </hbox>
    <hbox align="center" style="margin-top: 4px">
      <html:label
        for="zotero-prefpane-__addonRef__-maxItems"
        data-l10n-id="pref-maxItems"
        style="margin-inline-end: 8px"
      ></html:label>
      <html:input
        type="number"
        min="1"
        step="50"
        size="8"
        id="zotero-prefpane-__addonRef__-maxItems"
        preference="maxItems"
      />
    </hbox>
  </groupbox>

  <!-- 数据源 / Data sources -->
  <groupbox>
    <label><html:h3 data-l10n-id="group-sources"></html:h3></label>
    <checkbox
      id="zotero-prefpane-__addonRef__-useCrossref"
      preference="useCrossref"
      data-l10n-id="pref-useCrossref"
    />
    <checkbox
      id="zotero-prefpane-__addonRef__-useOpenAlex"
      preference="useOpenAlex"
      data-l10n-id="pref-useOpenAlex"
    />
    <checkbox
      id="zotero-prefpane-__addonRef__-useS2"
      preference="useS2"
      data-l10n-id="pref-useS2"
    />
    <checkbox
      id="zotero-prefpane-__addonRef__-useDBLP"
      preference="useDBLP"
      data-l10n-id="pref-useDBLP"
    />
  </groupbox>

  <!-- 凭据 / Credentials -->
  <groupbox>
    <label><html:h3 data-l10n-id="group-credentials"></html:h3></label>
    <vbox>
      <html:label
        for="zotero-prefpane-__addonRef__-contactEmail"
        data-l10n-id="pref-contactEmail"
      ></html:label>
      <html:input
        type="text"
        id="zotero-prefpane-__addonRef__-contactEmail"
        preference="contactEmail"
        style="width: 100%"
      />
    </vbox>
    <vbox style="margin-top: 6px">
      <html:label
        for="zotero-prefpane-__addonRef__-s2ApiKey"
        data-l10n-id="pref-s2ApiKey"
      ></html:label>
      <html:input
        type="text"
        id="zotero-prefpane-__addonRef__-s2ApiKey"
        preference="s2ApiKey"
        style="width: 100%"
      />
    </vbox>
  </groupbox>

  <!-- 字段白名单 / Field whitelist -->
  <groupbox>
    <label><html:h3 data-l10n-id="group-fields"></html:h3></label>
    <hbox>
      <vbox flex="1">
        <checkbox
          id="zotero-prefpane-__addonRef__-fieldTitle"
          preference="fieldTitle"
          data-l10n-id="pref-fieldTitle"
        />
        <checkbox
          id="zotero-prefpane-__addonRef__-fieldPublicationTitle"
          preference="fieldPublicationTitle"
          data-l10n-id="pref-fieldPublicationTitle"
        />
        <checkbox
          id="zotero-prefpane-__addonRef__-fieldDate"
          preference="fieldDate"
          data-l10n-id="pref-fieldDate"
        />
        <checkbox
          id="zotero-prefpane-__addonRef__-fieldVolume"
          preference="fieldVolume"
          data-l10n-id="pref-fieldVolume"
        />
        <checkbox
          id="zotero-prefpane-__addonRef__-fieldIssue"
          preference="fieldIssue"
          data-l10n-id="pref-fieldIssue"
        />
      </vbox>
      <vbox flex="1">
        <checkbox
          id="zotero-prefpane-__addonRef__-fieldPages"
          preference="fieldPages"
          data-l10n-id="pref-fieldPages"
        />
        <checkbox
          id="zotero-prefpane-__addonRef__-fieldDOI"
          preference="fieldDOI"
          data-l10n-id="pref-fieldDOI"
        />
        <checkbox
          id="zotero-prefpane-__addonRef__-fieldAbstractNote"
          preference="fieldAbstractNote"
          data-l10n-id="pref-fieldAbstractNote"
        />
        <checkbox
          id="zotero-prefpane-__addonRef__-fieldConferenceName"
          preference="fieldConferenceName"
          data-l10n-id="pref-fieldConferenceName"
        />
        <checkbox
          id="zotero-prefpane-__addonRef__-fieldProceedingsTitle"
          preference="fieldProceedingsTitle"
          data-l10n-id="pref-fieldProceedingsTitle"
        />
      </vbox>
    </hbox>
  </groupbox>

  <vbox style="margin-top: 8px; opacity: 0.7">
    <html:label
      data-l10n-id="pref-help"
      data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
    ></html:label>
  </vbox>
</vbox>
